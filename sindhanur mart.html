    const commission = parseFloat(document.getElementById('adminCommission')?.value) / 100 || 0.1;
    const deliveryCommission = parseFloat(document.getElementById('adminDeliveryCommission')?.value) / 100 || 0.15;
    if (!this.db.settings) this.db.settings = {};
    this.db.settings.commission = commission;
    this.db.settings.deliveryCommission = deliveryCommission;
    this.saveData();
    this.toast('✅ Settings saved!', 'success');
},

// ===== ADMIN: PROFILE =====
showAdminProfile() {
    const u = this.user;
    if (!u) { this.showAdminDashboard(); return; }
    this.currentScreen = 'profile';
    this.render(`
        <div class="screen" style="background:#fff;min-height:100vh">
            ${this.appBar('Admin Profile', 'goBack', '')}
            <div style="text-align:center;padding:1rem 0">
                <div class="profile-pic touchable" onclick="APP.updateProfilePic()">${u.profilePic ? `<img src="${u.profilePic}">` : '🛡️'}</div>
                <h2 style="margin-top:.5rem">${u.name}</h2>
                <p style="color:var(--text3)">${u.email}</p>
                <p style="font-size:.7rem;color:var(--text3)">Administrator | Joined: ${new Date(u.created).toLocaleDateString()}</p>
            </div>
            <div class="card"><h4>📱 Contact</h4><p>${u.email}</p></div>
            <button class="btn btn-secondary mt-2 touchable" onclick="APP.editProfile()"><i class="fas fa-edit"></i> Edit Profile</button>
            <button class="btn btn-danger mt-1 touchable" onclick="APP.logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            <button class="btn btn-ghost mt-1 touchable" onclick="APP.goBack()">← Back</button>
        </div>
    `);
},

// ============================================================
// COMMON FUNCTIONS
// ============================================================
showNotifications() {
    this.currentScreen = 'notifications';
    const notifs = this.db.notifications?.filter(n => n.userId === this.user?.id) || [];
    notifs.forEach(n => n.read = true);
    this.saveData();
    this.render(`
        <div class="dash" style="background:#fff">
            ${this.appBar('Notifications', 'goBack', '')}
            <div style="padding:1rem;padding-bottom:80px">
                ${notifs.length ? notifs.sort((a,b) => new Date(b.date) - new Date(a.date)).map(n => `
                    <div class="card" style="margin-bottom:.5rem">
                        <h4>${n.title}</h4>
                        <p style="font-size:.85rem;color:var(--text3)">${n.message}</p>
                        <p style="font-size:.65rem;color:var(--text3)">${new Date(n.date).toLocaleDateString()}</p>
                        ${n.orderId ? `<button class="btn btn-primary btn-sm mt-1" onclick="APP.showOrderTracking('${n.orderId}')">View Order</button>` : ''}
                    </div>
                `).join('') : '<p class="text-center" style="padding:2rem;color:var(--text3)">No notifications</p>'}
            </div>
        </div>
    `);
},
addNotification(orderId, title, message) {
    const order = this.db.orders.find(o => o.id === orderId);
    if (!order) return;
    if (!this.db.notifications) this.db.notifications = [];
    const users = [{ id: order.customerId, type: 'customer' }, { id: order.sellerId, type: 'seller' }];
    if (order.deliveryPartner) users.push({ id: order.deliveryPartner, type: 'delivery' });
    users.forEach(u => {
        this.db.notifications.push({
            id: 'notif_' + Date.now() + '_' + u.type,
            orderId, userId: u.id, userType: u.type,
            title: u.type === 'customer' ? title : (u.type === 'seller' ? 'Order: ' + title : 'Delivery: ' + title),
            message: message || title + (orderId ? ' for #' + orderId.slice(-6) : ''),
            read: false, date: new Date().toISOString()
        });
    });
    this.saveData();
},
getStatusLabel(status) {
    const labels = {
        'placed': 'Placed', 'confirmed': 'Confirmed', 'preparing': 'Preparing',
        'ready': 'Ready', 'assigned': 'Assigned', 'pickup_otp': 'Pickup OTP',
        'picked': 'Picked', 'shipped': 'Shipped', 'arriving': 'Arriving',
        'delivery_otp': 'Delivery OTP', 'delivered': 'Delivered',
        'completed': 'Completed', 'returned': 'Returned'
    };
    return labels[status] || status;
},
getStatusIcon(status) {
    const icons = {
        'placed': 'fa-clock', 'confirmed': 'fa-check-circle', 'preparing': 'fa-box',
        'ready': 'fa-box-open', 'assigned': 'fa-user-check',
        'pickup_otp': 'fa-shield-alt', 'picked': 'fa-truck',
        'shipped': 'fa-shipping-fast', 'arriving': 'fa-clock',
        'delivery_otp': 'fa-shield-alt', 'delivered': 'fa-check-double',
        'completed': 'fa-check-circle', 'returned': 'fa-undo'
    };
    return icons[status] || 'fa-circle';
},
getOrderTimeline(orderId) {
    if (!this.db.orderTimelines) this.db.orderTimelines = {};
    if (!this.db.orderTimelines[orderId]) this.db.orderTimelines[orderId] = [];
    return this.db.orderTimelines[orderId];
},
addTimelineEvent(orderId, status, title, description) {
    const timeline = this.getOrderTimeline(orderId);
    timeline.push({ status, title, description: description || '', date: new Date().toISOString() });
    this.saveData();
    this.addNotification(orderId, title, description);
    return timeline;
},

// ===== LOGOUT =====
logout() {
    if (confirm('Logout?')) {
        this.stopTracking();
        this.session = null; this.user = null; this.role = null;
        localStorage.removeItem('sm_session');
        this.toast('Logged out', 'success');
        this.showWelcome();
    }
},
handleImage(e) {
    const f = e.target.files[0];
    if (f && this.imgCB) {
        const r = new FileReader();
        r.onload = ev => this.imgCB(ev.target.result);
        r.readAsDataURL(f);
    }
    e.target.value = '';
}
};
APP.init();
</script>
</body>
</html>
